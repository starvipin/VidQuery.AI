name: CI/CD Pipeline to Hugging Face Spaces

on:
  push:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run Pytest
        env:
          # Ye line GitHub locker se asli key nikal kar code ko de degi
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} 
        run: PYTHONPATH=. uv run pytest tests/

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Actions ke server par purani history delete karo (GitHub par safe rahegi)
          rm -rf .git
          
          # 2. Default branch ka naam 'main' set karke naya git shuru karo
          git config --global init.defaultBranch main
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # 3. Hugging Face ko remote add karo
          git remote add hf https://sainivipin:$HF_TOKEN@huggingface.co/spaces/sainivipin/VidQuery
          
          # 4. Saari saaf files add karke naya commit aur force push karo
          git add .
          git commit -m "Deploy fresh code to HF"
          git push --force hf main